appId: com.yiyi.assistant
productName: YiYi
directories:
  output: dist
  buildResources: build

mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  target:
    - target: dmg
      arch:
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    LSUIElement: true
    NSMicrophoneUsageDescription: "YiYi需要使用麦克风进行语音交互"
    NSSpeechRecognitionUsageDescription: "YiYi需要语音识别功能来理解您的指令"

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications

afterAllArtifactBuild: ./scripts/post-build.js
