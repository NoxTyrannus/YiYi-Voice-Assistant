name: Build YiYi DMG for macOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd YiYi
          npm install
          npm install --save-dev electron-builder

      - name: Build DMG
        run: |
          cd YiYi
          npm run build
          npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: YiYi-macOS-DMG
          path: YiYi/dist/YiYi-1.0.0.dmg
          retention-days: 30
